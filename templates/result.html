<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini CBT Engine - Result</title>
    <style>
        body {
            font-family: sans-serif;
            text-align: center;
            padding-top: 50px;
            background-color: #f4f4f9;
            color: #333;
        }

        .container {
            max-width: 600px;
            margin: auto;
            padding: 40px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        h1 {
            color: #0056b3;
        }

        .score {
            font-size: 3rem;
            font-weight: bold;
            margin: 20px 0;
            color: #d9534f;
        }

        .timestamp {
            color: #777;
            font-size: 0.9rem;
            margin-top: 30px;
        }

        .btn {
            padding: 10px 20px;
            font-size: 1rem;
            background-color: #0056b3;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            margin-top: 20px;
        }

        .btn:hover {
            background-color: #004494;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Test Completed!</h1>
        <p>Here is your final score:</p>
        <div class="score">{{ score }} / {{ total }}</div>
        <p>Percentage: {{ (score / total * 100) | round(1) }}%</p>

        <div class="timestamp">
            Completed on: {{ completion_time.strftime('%Y-%m-%d %H:%M:%S') }}
        </div>

        <a href="/" class="btn">Take Test Again</a>
    </div>
</body>

</html>
