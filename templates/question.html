<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini CBT Engine - Question</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #0f172a;
            --surface: #1e293b;
            --surface-hover: #334155;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0f172a;
            background-image: radial-gradient(at 0% 0%, hsla(253, 16%, 7%, 1) 0, transparent 50%), radial-gradient(at 50% 0%, hsla(225, 39%, 30%, 0.3) 0, transparent 50%), radial-gradient(at 100% 0%, hsla(339, 49%, 30%, 0.3) 0, transparent 50%);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 650px;
            width: 100%;
            padding: 40px;
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.98);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
        }

        .status {
            color: var(--primary);
            font-size: 0.95rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        .progress-bar {
            width: 100px;
            height: 6px;
            background: var(--surface-hover);
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--primary);
            transition: width 0.3s ease;
        }

        .question-text {
            font-size: 1.4rem;
            font-weight: 600;
            line-height: 1.5;
            margin-bottom: 30px;
        }

        .options-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 35px;
        }

        .option-label {
            display: flex;
            align-items: center;
            padding: 16px 20px;
            background: var(--surface);
            border: 2px solid var(--border);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 1.05rem;
        }

        .option-label:hover {
            border-color: var(--primary-hover);
            background: rgba(79, 70, 229, 0.1);
        }

        .option-label input[type="radio"] {
            appearance: none;
            width: 20px;
            height: 20px;
            border: 2px solid var(--text-muted);
            border-radius: 50%;
            margin-right: 15px;
            display: grid;
            place-content: center;
            transition: all 0.2s ease;
        }

        .option-label input[type="radio"]::before {
            content: "";
            width: 10px;
            height: 10px;
            border-radius: 50%;
            transform: scale(0);
            transition: 120ms transform ease-in-out;
            box-shadow: inset 1em 1em var(--primary);
        }

        .option-label input[type="radio"]:checked {
            border-color: var(--primary);
        }

        .option-label input[type="radio"]:checked::before {
            transform: scale(1);
        }

        /* Style when radio is checked */
        .option-label:has(input:checked) {
            border-color: var(--primary);
            background: rgba(99, 102, 241, 0.15);
        }

        .btn {
            width: 100%;
            padding: 16px;
            font-size: 1.1rem;
            font-weight: 600;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -10px rgba(99, 102, 241, 0.8);
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <div class="status">Question {{ current_num }} of {{ total_num }}</div>
            <div class="progress-bar">
                <div class="progress-fill" style="width: {{ progress_percent }}%;"></div>
            </div>
        </div>

        <div class="question-text">{{ question.text }}</div>

        <form action="/question" method="POST">
            <div class="options-group">
                {% for option in question.options %}
                <label class="option-label">
                    <input type="radio" name="answer" value="{{ option }}" required>
                    {{ option }}
                </label>
                {% endfor %}
            </div>
            <button type="submit" class="btn">Next Question</button>
        </form>
    </div>
</body>

</html>
