<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini CBT Engine - Question</title>
    <style>
        body {
            font-family: sans-serif;
            padding: 50px;
            background-color: #f4f4f9;
            color: #333;
            display: flex;
            justify-content: center;
        }

        .container {
            max-width: 600px;
            width: 100%;
            padding: 30px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .question-text {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .option {
            margin-bottom: 10px;
            display: block;
        }

        .btn {
            padding: 10px 20px;
            font-size: 1rem;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 20px;
        }

        .btn:hover {
            background-color: #218838;
        }

        .status {
            margin-bottom: 20px;
            color: #666;
            font-size: 0.9rem;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="status">Question {{ current_num }} of {{ total_num }}</div>
        <div class="question-text">{{ question.text }}</div>
        <form action="/question" method="POST">
            {% for option in question.options %}
            <label class="option">
                <input type="radio" name="answer" value="{{ option }}" required>
                {{ option }}
            </label>
            {% endfor %}
            <button type="submit" class="btn">Submit Answer</button>
        </form>
    </div>
</body>

</html>
