<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini CBT Engine - Question</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #0f172a;
            --surface: #1e293b;
            --surface-hover: #334155;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0f172a;
            background-image: radial-gradient(at 0% 0%, hsla(253, 16%, 7%, 1) 0, transparent 50%), radial-gradient(at 50% 0%, hsla(225, 39%, 30%, 0.3) 0, transparent 50%), radial-gradient(at 100% 0%, hsla(339, 49%, 30%, 0.3) 0, transparent 50%);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 650px;
            width: 100%;
            padding: 40px;
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: slideIn 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
        }

        .status {
            color: var(--primary);
            font-size: 0.95rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        .progress-bar {
            width: 150px;
            height: 8px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 4px;
            overflow: hidden;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), #818cf8);
            transition: width 0.8s cubic-bezier(0.65, 0, 0.35, 1);
            position: relative;
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.4);
        }

        .progress-fill::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            animation: progress-shimmer 2s infinite;
        }

        @keyframes progress-shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .question-text {
            font-size: 1.4rem;
            font-weight: 600;
            line-height: 1.5;
            margin-bottom: 30px;
        }

        .options-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 35px;
        }

        .option-label {
            display: flex;
            align-items: center;
            padding: 18px 24px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 1.05rem;
            position: relative;
            overflow: hidden;
        }

        .option-label:hover {
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.07);
            transform: translateX(4px);
        }

        .option-label input[type="radio"] {
            appearance: none;
            width: 22px;
            height: 22px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            margin-right: 15px;
            display: grid;
            place-content: center;
            transition: all 0.2s ease;
            background: rgba(15, 23, 42, 0.4);
        }

        .option-label input[type="radio"]::before {
            content: "";
            width: 12px;
            height: 12px;
            border-radius: 50%;
            transform: scale(0);
            transition: 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
            background: var(--primary);
            box-shadow: 0 0 10px var(--primary);
        }

        .option-label input[type="radio"]:checked {
            border-color: var(--primary);
            background: rgba(99, 102, 241, 0.1);
        }

        .option-label input[type="radio"]:checked::before {
            transform: scale(1);
        }

        /* Style when radio is checked */
        .option-label:has(input:checked) {
            border-color: var(--primary);
            background: rgba(99, 102, 241, 0.15);
        }

        .btn {
            width: 100%;
            padding: 16px;
            font-size: 1.1rem;
            font-weight: 600;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -10px rgba(99, 102, 241, 0.8);
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <div class="status">Question {{ current_num }} of {{ total_num }}</div>
            <div class="progress-bar">
                <div class="progress-fill" style="--width: {{ progress_percent }}%; width: var(--width);"></div>
            </div>
        </div>

        <div class="question-text">{{ question.text }}</div>

        <form action="/question" method="POST">
            <div class="options-group">
                {% for option in question.options %}
                <label class="option-label">
                    <input type="radio" name="answer" value="{{ option }}" required>
                    {{ option }}
                </label>
                {% endfor %}
            </div>
            <button type="submit" class="btn">Next Question</button>
        </form>
    </div>
</body>

</html>
